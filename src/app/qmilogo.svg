        QMI
  </text>

  <!-- Arabic -->
  <text x="256"
        y="432"
        text-anchor="middle"
        direction="rtl"
        unicode-bidi="bidi-override"
        font-family="Amiri, Noto Naskh Arabic, Cairo"
        font-size="24"
        fill="#1B5E20">
        التربية بالقيم
  </text>

  <text x="256"
        y="462"
        text-anchor="middle"
        direction="rtl"
        unicode-bidi="bidi-override"
        font-family="Amiri, Noto Naskh Arabic, Cairo"
        font-size="24"
        fill="#1B5E20">
        والسلوك القرآني
  </text>

</svg>