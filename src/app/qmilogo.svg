  <path d="M256 145
           C252 118 256 95 256 88
           C270 110 272 135 264 160Z"
        fill="#2E7D32"/>

  <!-- Base -->
  <path d="M170 320 Q256 345 342 320"
        fill="none"
        stroke="#1B5E20"
        stroke-width="10"/>

  <!-- English initials -->
  <text x="256"
        y="390"
        text-anchor="middle"
        font-family="Georgia"
        font-size="62"
        font-weight="bold"
