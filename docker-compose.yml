# =============================================
# QMI Compass - Docker Compose
# For local testing or VM deployment
# =============================================

services:
  app:
    build: .
    container_name: qmi-compass
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - qmi-data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/qmi.db
      - AUTH_SECRET=${AUTH_SECRET:-changeme-generate-a-real-secret}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  qmi-data:
