# =============================================
# Google Cloud Build - CI/CD Pipeline
# Triggers: Push to main branch
# =============================================

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/qmi-compass:${SHORT_SHA}', '.']
    id: 'build'

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/qmi-compass:${SHORT_SHA}']
    id: 'push'
    waitFor: ['build']

  # Step 3: Also tag as 'latest'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/qmi-compass:${SHORT_SHA}', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/qmi-compass:latest']
    id: 'tag'
    waitFor: ['push']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/qmi-compass:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-env-vars=DATABASE_URL=file:/app/data/qmi.db'
      - '--set-secrets=AUTH_SECRET=auth-secret:latest'
      - '--allow-unauthenticated'
    id: 'deploy'
    waitFor: ['push']

  # Step 5: Seed the database (only on first deploy or when needed)
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Seeding database..."
        # Wait for the service to be ready
        sleep 15
        SERVICE_URL=$(gcloud run services describe ${_SERVICE_NAME} --region=${_REGION} --format='value(status.url)')
        curl -s -X POST "$${SERVICE_URL}/api/seed" || echo "Seed may have already been run or service not ready yet"
    id: 'seed'
    waitFor: ['deploy']

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/qmi-compass:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/qmi-compass:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

substitutions:
  _REGION: europe-west1
  _REPO: qmi-compass-repo
  _SERVICE_NAME: qmi-compass
